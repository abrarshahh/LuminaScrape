# LuminaScrape Model Configuration
# Use LiteLLM prefixes:
# - Local: ollama/llama3.2
# - OpenAI: gpt-4o-mini
# - Anthropic: claude-3-5-sonnet-20240620
# - Google: gemini/gemini-1.5-pro

agents:
  pilot:
    model: "ollama/llama3.2-vision"
    temperature: 0.0
    description: "The Preparer Agent responsible for visual analysis and blockade busting."
  
  extractor:
    model: "ollama/deepseek-r1:8b"
    temperature: 0.0
    description: "The Data Extraction Agent utilizing DeepSeek's reasoning for MD to JSON."

  overseer:
    model: "ollama/deepseek-r1:8b"
    temperature: 0.0
    description: "The Quality Control Agent responsible for data verification."

global_settings:
  fallback_model: "gpt-4o-mini" # Used if local model fails
  enable_fallbacks: false
